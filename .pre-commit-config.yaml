repos:
- repo: local
  hooks:
    - id: ruff-check
      name: ruff check
      entry: ruff check
      language: system
      types: [python]
      args: [--fix]

    - id: ruff-format
      name: ruff format
      entry: ruff format
      language: system
      types: [python]

    - id: mypy
      name: mypy
      entry: mypy
      language: system
      types: [python]
      args: [--config-file, pyproject.toml]
      pass_filenames: false

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
    - id: check-yaml
    - id: check-toml
    - id: check-json
    - id: check-merge-conflict
    - id: check-added-large-files
      args: [--maxkb=500]
    - id: end-of-file-fixer
    - id: trailing-whitespace
    - id: detect-private-key

- repo: https://github.com/gitleaks/gitleaks
  rev: v8.30.1
  hooks:
    - id: gitleaks
